<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#111111">
  <title>DeepSeek 对话</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新建对话
        </button>
      </div>
      <div class="conversation-list" id="conversationList"></div>
      <div class="sidebar-footer">
        <button class="settings-btn" id="settingsBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          设置
        </button>
      </div>
    </aside>

    <!-- Toggle sidebar on mobile -->
    <button class="sidebar-toggle" id="sidebarToggle">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <!-- Main chat area -->
    <main class="main">
      <!-- Top bar -->
      <div class="topbar">
        <div class="topbar-title" id="topbarTitle">DeepSeek 对话</div>
        <div class="topbar-actions">
          <button class="icon-btn" id="clearChatBtn" title="清空当前对话">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>

      <!-- Messages -->
      <div class="chat-container" id="chatContainer">
        <div class="welcome-screen" id="welcomeScreen">
          <h1>有什么可以帮你的？</h1>
        </div>
        <div class="messages" id="messages"></div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-toolbar">
          <div class="toolbar-left">
            <select class="toolbar-select" id="modelSelect">
              <option value="deepseek-v4-flash">DeepSeek V4 Flash</option>
              <option value="deepseek-v4-pro">DeepSeek V4 Pro</option>
            </select>
            <button class="think-btn" id="thinkBtn" title="深度思考">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 1 7 7c0 2.4-1.2 4.5-3 5.7V17a1 1 0 0 1-1 1h-6a1 1 0 0 1-1-1v-2.3C6.2 13.5 5 11.4 5 9a7 7 0 0 1 7-7z"/><line x1="9" y1="21" x2="15" y2="21"/></svg>
              深度思考
            </button>
            <select class="toolbar-select think-effort" id="thinkEffort">
              <option value="high">高</option>
              <option value="max">最高</option>
            </select>
          </div>
        </div>
        <div class="attachment-preview hidden" id="attachmentPreview"></div>
        <div class="input-wrapper">
          <button class="attach-btn" id="attachBtn" title="上传文件">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input type="file" id="fileInput" multiple accept="image/*,.txt,.md,.json,.csv,.xml,.html,.css,.js,.py,.java,.c,.cpp,.go,.rs,.ts,.tsx,.jsx,.rb,.php,.sh,.yaml,.yml,.toml,.ini,.log,.sql,.r,.swift,.kt" style="display:none">
          <textarea id="messageInput" placeholder="输入消息..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
          <button class="stop-btn hidden" id="stopBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          </button>
        </div>
        <div class="input-hint">DeepSeek API - 令牌仅存储在本地浏览器中</div>
      </div>
    </main>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay hidden" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h2>设置</h2>
        <button class="modal-close" id="closeSettingsBtn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="apiKeyInput">API 密钥</label>
          <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
          <p class="form-hint">API 密钥仅存储在浏览器本地。</p>
        </div>
        <div class="form-group">
          <label for="apiUrlInput">API Base URL</label>
          <input type="text" id="apiUrlInput" placeholder="https://api.deepseek.com" autocomplete="off">
          <p class="form-hint">支持 OpenAI 兼容端点，留空使用默认 DeepSeek API。</p>
        </div>
        <div class="form-group">
          <label for="systemPromptInput">系统提示词（可选）</label>
          <textarea id="systemPromptInput" rows="3" placeholder="你是一个有帮助的助手。"></textarea>
        </div>
        <div class="form-group">
          <label for="temperatureInput">采样温度 <span id="temperatureValue">1</span></label>
          <input type="range" id="temperatureInput" min="0" max="2" step="0.1" value="1">
          <p class="form-hint">0-2之间，更高的值会使输出更随机，更低的值会使其更加集中。</p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="saveSettingsBtn">保存</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
